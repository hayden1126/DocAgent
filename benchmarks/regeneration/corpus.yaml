# Regeneration benchmark corpus.
#
# Each entry pins a repo to a specific commit so runs are reproducible
# even after upstream changes. Update `sha` deliberately; don't auto-bump.
#
# Selection criteria:
#   - Substantial hand-written docs (README + how-to or guide content)
#   - Fits in a 200k-context window comfortably
#   - Not in DocAgent's golden fixtures
#   - Mix of CLI / library / framework shapes

repos:
  - name: tinydb
    language: python
    url: https://github.com/msiemens/tinydb
    sha: 0428e3375e961a5f9f6c00d96d6750de8eb66de8
    notes: "Already validated in v1.0 live test; serves as sanity-check baseline."

  - name: click
    language: python
    url: https://github.com/pallets/click
    sha: c9e94136b39b1fad4a47ac0d4478fa372bd07ff8
    notes: "CLI library; docs/ is Sphinx (RST) — strip_docs will skip it."

  - name: typer
    language: python
    url: https://github.com/fastapi/typer
    sha: 4e39eb7751d1dd4a94b3bf939d7f233ff517fee2
    notes: "CLI built on click; mkdocs-material docs (Markdown — OK to strip)."

  - name: httpx
    language: python
    url: https://github.com/encode/httpx
    sha: b5addb64f0161ff6bfe94c124ef76f6a1fba5254
    notes: "Async-capable HTTP client; mkdocs-material docs (Markdown)."

  - name: rich
    language: python
    url: https://github.com/Textualize/rich
    sha: 46cebbb032f920eb096efbaf23cdc6fe9dd541f7
    notes: "Large API surface; docs/ is Sphinx (RST) — strip_docs will skip it."

  - name: zod
    language: typescript
    url: https://github.com/colinhacks/zod
    sha: b6071fc0ad2be94850ed57e07e418a6f902a9771
    notes: "TS schema library; tests the TS api_reference artifact."

  - name: hono
    language: typescript
    url: https://github.com/honojs/hono
    sha: 7e62bcd22fa4e8f0e83cb564bac85e32f5434dd3
    notes: "Web framework; mixed JS/TS; tests cross-file resolution."

# Repos to AVOID:
#   - fastapi: too large for clean context windows in single pass
#   - requests: docs are partially auto-generated (Sphinx) — confounds comparison
#   - tanstack-query: very large; defer to v1.1 expanded corpus
